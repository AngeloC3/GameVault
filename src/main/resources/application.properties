# H2 in-file mode so data persists between runs
spring.datasource.url=jdbc:h2:file:./gamevault-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console (useful for debugging at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

game.search.service=mock
rawg.api.key=placeholder_key